<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رادار الذهب</title>

<style>
body {
    background:#000;
    color:#fff;
    font-family:Tahoma;
    text-align:center;
    margin:0;
    padding:20px;
}

h1 {
    color:gold;
    margin-bottom:20px;
}

.box {
    background:#111;
    border:1px solid #333;
    border-radius:12px;
    padding:15px;
    margin:10px auto;
    max-width:350px;
}

.price {
    font-size:24px;
    color:#00ff99;
    margin-top:10px;
}

.note {
    color:#aaa;
    font-size:14px;
}
</style>
</head>

<body>

<h1>📊 رادار الذهب</h1>

<div class="box">
    الأونصة (XAUUSD)
    <div class="price" id="ounce">...</div>
</div>

<div class="box">
    جرام 24
    <div class="price" id="g24">...</div>
</div>

<div class="box">
    جرام 21
    <div class="price" id="g21">...</div>
</div>

<div class="box">
    جرام 18
    <div class="price" id="g18">...</div>
</div>

<div class="box">
    جرام 21 بالريال اليمني
    <div class="price" id="yem21">...</div>
</div>

<div class="box">
    جرام 21 بالريال السعودي
    <div class="price" id="sar21">...</div>
</div>

<div class="box">
    حالة التحديث
    <div class="note" id="status">يتم التحديث...</div>
</div>

<script>
// سعر ثابت (تقدر تعدله يدوي)
let ounce = 2150;

// أسعار التحويل
const USD_TO_YEM = 530;
const USD_TO_SAR = 3.75;

function updatePrices(){

    let gram24 = ounce / 31.1;
    let gram21 = gram24 * 0.875;
    let gram18 = gram24 * 0.75;

    document.getElementById("ounce").innerText = ounce + " $";
    document.getElementById("g24").innerText = gram24.toFixed(2) + " $";
    document.getElementById("g21").innerText = gram21.toFixed(2) + " $";
    document.getElementById("g18").innerText = gram18.toFixed(2) + " $";

    document.getElementById("yem21").innerText =
        Math.round(gram21 * USD_TO_YEM) + " ريال";

    document.getElementById("sar21").innerText =
        (gram21 * USD_TO_SAR).toFixed(2) + " ريال";

    document.getElementById("status").innerText = "يعمل بدون إنترنت ✅";
}

// تحديث تلقائي كل 3 ثواني (اختياري)
setInterval(()=>{
    ounce += Math.random() * 2 - 1; // حركة وهمية للسعر
    updatePrices();
}, 3000);

updatePrices();
</script>

</body>
</html>
