<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رادار الأسعار المباشر</title>

<style>
body{background:#000;color:#fff;font-family:Tahoma;text-align:center;margin:0;padding:0;}
h1{color:gold;margin:20px;font-size:30px;}

.box{background:#111;border:1px solid #333;border-radius:14px;padding:15px;margin:10px auto;max-width:350px;}
.price{font-size:26px;color:#00ff99;margin-top:10px;}

.top{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:10px;}
.card{flex:1 1 200px;background:#111;border:1px solid #333;border-radius:12px;padding:15px;}

.buy{background:#053d16;}
.sell{background:#5f0909;}

.karat{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:10px;}
.karat div{background:#111;padding:15px;border-radius:12px;border:1px solid #333;}

.section{width:95%;max-width:1100px;margin:15px auto;background:#111;padding:15px;border-radius:16px;border:1px solid #333;}
.title{color:gold;font-size:22px;margin-bottom:10px;}

.status{color:#888;font-size:14px;margin:10px;}

</style>
</head>

<body>

<h1>🏆 رادار بشار النقيب لأسعار الذهب المباشر</h1>

<div class="top">
    <div class="card buy">
        <div>سعر الشراء</div>
        <div class="price" id="buyPrice">...</div>
    </div>

    <div class="card sell">
        <div>سعر البيع</div>
        <div class="price" id="sellPrice">...</div>
    </div>
</div>

<div class="karat">
    <div>أونصة: <span id="ouncePrice">...</span></div>
    <div>جرام 24: <span id="gram24">...</span></div>
    <div>جرام 21: <span id="gram21">...</span></div>
    <div>جرام 18: <span id="gram18">...</span></div>
</div>

<!-- 💵 مؤشر الدولار (مستقل) -->
<div class="section">
    <div class="title">💵 مؤشر الدولار</div>

    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-info.js" async>
        {
            "symbol": "TVC:DXY",
            "width": "100%",
            "locale": "ar",
            "colorTheme": "dark"
        }
        </script>
    </div>
</div>

<!-- 📊 المؤشرات -->
<div class="section">
    <div class="title">📊 المؤشرات الحية</div>

    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-tickers.js" async>
        {
            "symbols": [
                {"proName": "OANDA:XAUUSD","title": "الذهب"},
                {"proName": "OANDA:XAGUSD","title": "الفضة"},
                {"proName": "TVC:UKOIL","title": "نفط برنت"},
                {"proName": "TVC:USOIL","title": "النفط"}
            ],
            "colorTheme": "dark",
            "locale": "ar"
        }
        </script>
    </div>
</div>

<div class="status" id="status">جاري التحميل...</div>

<script>
// =====================
// إعداداتك (مخفية)
// =====================
const API_KEY = "2cad562e57af449282b26db26e53403e";
const YER_RATE = 535;
const BUY_EXTRA = 0;
const SELL_DIFF = 4000;
const UPDATE_INTERVAL = 30000;
// =====================

function format(n){return Math.round(n).toLocaleString()+" ريال"}

async function getPrice(){
    const res = await fetch(`https://api.twelvedata.com/price?symbol=XAU/USD&apikey=${API_KEY}`);
    const data = await res.json();
    return parseFloat(data.price);
}

async function update(){
    try{
        document.getElementById("status").innerText="تحديث...";

        let ounce = await getPrice();

        let g24 = ounce / 31.1035;
        let g21 = g24 * 0.875;
        let g18 = g24 * 0.75;

        let g24y = g24 * YER_RATE;
        let g21y = g21 * YER_RATE;
        let g18y = g18 * YER_RATE;

        let buy = g21y + BUY_EXTRA;
        let sell = buy + SELL_DIFF;

        document.getElementById("buyPrice").innerText = format(buy);
        document.getElementById("sellPrice").innerText = format(sell);

        document.getElementById("ouncePrice").innerText = ounce.toFixed(2);
        document.getElementById("gram24").innerText = format(g24y);
        document.getElementById("gram21").innerText = format(g21y);
        document.getElementById("gram18").innerText = format(g18y);

        document.getElementById("status").innerText="آخر تحديث: "+new Date().toLocaleTimeString();

    }catch(e){
        document.getElementById("status").innerText="خطأ في التحديث";
    }
}

update();
setInterval(update, UPDATE_INTERVAL);
</script>

</body>
</html>
