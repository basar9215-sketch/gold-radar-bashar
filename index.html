<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رادار الذهب المباشر</title>

<style>
body{
background:#000;
color:#fff;
font-family:Tahoma;
text-align:center;
margin:0
}

h1{
color:gold;
margin-top:20px
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px
}

.widget{
border:1px solid #333;
border-radius:10px;
overflow:hidden;
width:380px
}

.price{
font-size:24px;
color:gold;
margin-top:20px
}
</style>

</head>

<body>

<h1>🏆 تحليل الذهب / دولار لحظياً</h1>

<div class="price">
سعر الذهب عيار 21 بالريال اليمني: <span id="yemenPrice">جاري التحميل...</span>
</div>

<div class="container">

<div class="widget">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
{
"interval": "5m",
"width": "100%",
"height": "450",
"symbol": "OANDA:XAUUSD",
"showIntervalTabs": true,
"displayMode": "single",
"locale": "ar",
"colorTheme": "dark"
}
</script>

</div>
</div>

<div class="widget">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-info.js" async>
{
"symbol": "OANDA:XAUUSD",
"width": "100%",
"locale": "ar",
"colorTheme": "dark"
}
</script>

</div>
</div>

<div class="widget">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
{
"symbol": "OANDA:XAUUSD",
"width": "100%",
"height": "450",
"locale": "ar",
"dateRange": "1D",
"colorTheme": "dark"
}
</script>

</div>
</div>

</div>

<script>
async function loadPrice(){
let gold=5129; 
let usdToYemeni=1300;

let gram24=(gold/31.103);
let gram21=gram24*0.875;

let priceYemen=Math.round(gram21*usdToYemeni);

document.getElementById("yemenPrice").innerText=priceYemen+" ريال";
}

loadPrice();
</script>

</body>
</html>
