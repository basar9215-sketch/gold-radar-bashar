<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>رادار الذهب المباشر</title>

<style>

body{
background:#000;
color:#fff;
font-family:Tahoma;
text-align:center;
margin:0
}

h1{
color:gold;
margin-top:20px
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px
}

.widget{
border:1px solid #333;
border-radius:10px;
overflow:hidden;
width:380px
}

.yemenPrice{
background:#111;
border:1px solid #333;
padding:15px;
margin:15px auto;
width:360px;
border-radius:10px;
font-size:20px;
color:#FFD700
}

</style>

</head>

<body>

<h1>🏆 تحليل الذهب / دولار لحظياً</h1>

<div class="yemenPrice">
🇾🇪 سعر جرام الذهب عيار 21 باليمني  
<div id="goldYER">جاري التحميل...</div>
</div>

<div class="container">

<!-- تحليل فني -->
<div class="widget">

<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
{
"interval": "5m",
"width": "100%",
"height": "450",
"symbol": "OANDA:XAUUSD",
"showIntervalTabs": true,
"displayMode": "single",
"locale": "ar",
"colorTheme": "dark"
}
</script>

</div>

</div>

<!-- معلومات السعر -->
<div class="widget">

<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-info.js" async>
{
"symbol": "OANDA:XAUUSD",
"width": "100%",
"locale": "ar",
"colorTheme": "dark"
}
</script>

</div>

</div>

<!-- شارت مباشر -->
<div class="widget">

<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
{
"symbol": "OANDA:XAUUSD",
"width": "100%",
"height": "450",
"locale": "ar",
"dateRange": "1D",
"colorTheme": "dark"
}
</script>

</div>

</div>

</div>

<script>

const API_KEY = "2cad562e57af449282b26db26e53403e"

// سعر الصرف التقريبي
const YER_RATE = 528

async function updateGold(){

let url = `https://api.twelvedata.com/price?symbol=XAU/USD&apikey=${API_KEY}`

let res = await fetch(url)

let data = await res.json()

let ounce = parseFloat(data.price)

// تحويل الأونصة إلى جرام
let gram24 = ounce / 31.1035

// عيار 21
let gram21 = gram24 * 0.875

// بالريال اليمني
let priceYER = gram21 * YER_RATE

document.getElementById("goldYER").innerHTML =
Math.round(priceYER).toLocaleString("ar-YE") + " ريال"

}

updateGold()

setInterval(updateGold,60000)

</script>

</body>
</html>
