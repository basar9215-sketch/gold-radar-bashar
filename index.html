<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رادار الذهب المباشر</title>
<style>
body{
background:#000;
color:#fff;
font-family:Tahoma;
text-align:center;
margin:0;
padding:0
}
h1{
color:gold;
margin-top:20px
}
.box{
background:#111;
border:1px solid #333;
border-radius:10px;
padding:20px;
margin:20px auto;
width:90%;
max-width:400px;
font-size:20px
}
.price{
font-size:28px;
color:#00ffcc;
margin-top:10px
}
.note{
font-size:14px;
color:#aaa;
margin-top:10px
}
</style>
</head>
<body>

<h1>🏆 رادار الذهب المباشر</h1>

<div class="box">
الأونصة (XAUUSD)
<div class="price" id="ounce">...</div>
</div>

<div class="box">
جرام 24
<div class="price" id="g24">...</div>
</div>

<div class="box">
جرام 21
<div class="price" id="g21">...</div>
</div>

<div class="box">
جرام 18
<div class="price" id="g18">...</div>
</div>

<div class="box">
جرام 21 بالريال اليمني
<div class="price" id="yem21">...</div>
</div>

<div class="box">
جرام 21 بالريال السعودي
<div class="price" id="sar21">...</div>
</div>

<div class="box">
حالة التحديث
<div class="note" id="status">جاري التحميل...</div>
</div>

<script>
const goldAPI = "https://api.gold-api.com/price/XAU";

async function updateGold(){
  try{
    document.getElementById("status").innerText = "جاري التحديث...";

    let res = await fetch(goldAPI, { cache: "no-store" });

    if(!res.ok){
      throw new Error("HTTP Error: " + res.status);
    }

    let data = await res.json();

    let ounce = Number(data.price);

    if(!ounce || isNaN(ounce)){
      throw new Error("السعر غير صالح");
    }

    let gram24 = ounce / 31.1035;
    let gram21 = gram24 * 0.875;
    let gram18 = gram24 * 0.75;

    let usdToYem = 530;
    let usdToSar = 3.75;

    document.getElementById("ounce").innerText = ounce.toFixed(2) + " $";
    document.getElementById("g24").innerText = gram24.toFixed(2) + " $";
    document.getElementById("g21").innerText = gram21.toFixed(2) + " $";
    document.getElementById("g18").innerText = gram18.toFixed(2) + " $";
    document.getElementById("yem21").innerText = (gram21 * usdToYem).toFixed(0) + " ريال";
    document.getElementById("sar21").innerText = (gram21 * usdToSar).toFixed(2) + " ريال";

    document.getElementById("status").innerText = "تم التحديث بنجاح";
  }catch(error){
    document.getElementById("status").innerText = "تعذر جلب السعر الآن";
    console.log(error);
  }
}

updateGold();
setInterval(updateGold, 10000);
</script>

</body>
</html>
