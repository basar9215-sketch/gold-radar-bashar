<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رادار الذهب المباشر</title>
<style>
body{
  background:#000;
  color:#fff;
  font-family:Tahoma, sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
}
h1{color:gold;margin:10px 0 20px}
.box{
  background:#111;
  border:1px solid #333;
  border-radius:12px;
  padding:18px;
  margin:14px auto;
  width:92%;
  max-width:420px;
}
.price{
  font-size:28px;
  color:#00e5c3;
  margin-top:8px;
  font-weight:bold;
}
.note{
  color:#aaa;
  font-size:14px;
}
.warn{
  color:#ffb84d;
}
</style>
</head>
<body>

<h1>🏆 رادار الذهب المباشر</h1>

<div class="box">
  الأونصة (XAUUSD)
  <div class="price" id="ounce">جاري التحميل...</div>
</div>

<div class="box">
  جرام 24
  <div class="price" id="g24">...</div>
</div>

<div class="box">
  جرام 21
  <div class="price" id="g21">...</div>
</div>

<div class="box">
  جرام 18
  <div class="price" id="g18">...</div>
</div>

<div class="box">
  جرام 21 بالريال اليمني
  <div class="price" id="yem21">...</div>
</div>

<div class="box">
  جرام 21 بالريال السعودي
  <div class="price" id="sar21">...</div>
</div>

<div class="box">
  حالة التحديث
  <div class="note" id="status">بدء التحميل...</div>
</div>

<script>
const GOLD_API = "https://api.gold-api.com/price/XAU";
const USD_TO_YEM = 530;
const USD_TO_SAR = 3.75;

function setValues(ounce){
  const gram24 = ounce / 31.1035;
  const gram21 = gram24 * 0.875;
  const gram18 = gram24 * 0.75;

  document.getElementById("ounce").innerText = ounce.toFixed(2) + " $";
  document.getElementById("g24").innerText = gram24.toFixed(2) + " $";
  document.getElementById("g21").innerText = gram21.toFixed(2) + " $";
  document.getElementById("g18").innerText = gram18.toFixed(2) + " $";

  document.getElementById("yem21").innerText =
    Math.round(gram21 * USD_TO_YEM) + " ريال";

  document.getElementById("sar21").innerText =
    (gram21 * USD_TO_SAR).toFixed(2) + " ريال";
}

async function updateGold(){
  try{
    const res = await fetch(GOLD_API);
    const data = await res.json();
    const ounce = data.price;

    setValues(ounce);

    document.getElementById("status").innerText = "تم التحديث";
  }catch(e){
    setValues(5150);
    document.getElementById("status").innerText = "تعذر الاتصال - سعر تقريبي";
  }
}

updateGold();
setInterval(updateGold, 10000);
  </script>
